<script>
const RELOAD_MS = 180000;
const $ = s => document.querySelector(s);
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(pw, salt, iter){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function decryptPayload(pw, data){
  const key = await deriveKey(pw, b64(data.salt), data.iter);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(data.iv)}, key, b64(data.ct));
  return new TextDecoder().decode(pt);
}
function currentPayload(){ return JSON.parse($('#payload').textContent); }

async function show(pw){
  const html = await decryptPayload(pw, currentPayload());  // 失敗時は例外
  sessionStorage.setItem('wfpw', pw);
  $('#gate').style.display = 'none';
  $('#view').style.display = 'flex';
  $('#frame').srcdoc = html;
  $('#upd').textContent = '最終更新 ' + new Date().toLocaleTimeString('ja-JP');
  scheduleRefresh();
}
let timer = null;
function scheduleRefresh(){
  clearTimeout(timer);
  timer = setTimeout(refresh, RELOAD_MS);
}
async function refresh(){
  const pw = sessionStorage.getItem('wfpw');
  if(!pw){ return; }
  try{
    const res = await fetch(location.href, {cache:'no-store'});
    const txt = await res.text();
    const doc = new DOMParser().parseFromString(txt, 'text/html');
    const data = JSON.parse(doc.querySelector('#payload').textContent);
    const html = await decryptPayload(pw, data);
    $('#frame').srcdoc = html;
    $('#upd').textContent = '最終更新 ' + new Date().toLocaleTimeString('ja-JP');
  }catch(e){ /* 失敗しても次回再試行 */ }
  scheduleRefresh();
}
async function tryShow(pw){
  try { await show(pw); $('#err').textContent=''; }
  catch(e){ sessionStorage.removeItem('wfpw'); $('#err').textContent = 'パスワードが違います'; }
}
$('#go').onclick = () => tryShow($('#pw').value);
$('#pw').addEventListener('keydown', e => { if(e.key==='Enter') tryShow($('#pw').value); });
// 既に同セッションで認証済みなら自動表示
const saved = sessionStorage.getItem('wfpw');
if(saved){ tryShow(saved); }
</script></body></html>
